name: PR

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  build:
    name: Build
    uses: ./.github/workflows/build.yml

  no_failures:
    name: No PR failures
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
    if: ${{ failure() }}
    steps:
      - run: exit 1

